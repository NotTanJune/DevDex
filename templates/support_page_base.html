<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} — {{ page_title | default('Support') }}</title>
    <style>
        :root {
            --primary: {{ primary_color | default('#6366f1') }};
            --primary-dark: {{ primary_dark | default('#4f46e5') }};
            --text: #1e293b;
            --text-muted: #64748b;
            --bg: #ffffff;
            --bg-alt: #f8fafc;
            --border: #e2e8f0;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: var(--text); background: var(--bg); line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }
        a { color: var(--primary); text-decoration: none; }
        a:hover { opacity: 0.8; }

        .page-nav {
            background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); padding: 0 24px;
        }
        .page-nav-inner {
            max-width: 800px; margin: 0 auto; height: 56px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .page-nav a.brand { font-weight: 700; color: var(--primary); font-size: 1.1rem; }
        .page-nav a.back { color: var(--text-muted); font-size: 0.9rem; }

        .page-content {
            max-width: 800px; margin: 0 auto; padding: 80px 24px 64px;
        }
        .page-content h1 {
            font-size: 2rem; font-weight: 700; margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .page-meta {
            color: var(--text-muted); font-size: 0.9rem; margin-bottom: 40px;
            padding-bottom: 24px; border-bottom: 1px solid var(--border);
        }
        .page-content h2 {
            font-size: 1.35rem; font-weight: 700; margin-top: 40px;
            margin-bottom: 12px; color: var(--text);
        }
        .page-content h3 {
            font-size: 1.1rem; font-weight: 600; margin-top: 28px;
            margin-bottom: 8px;
        }
        .page-content p { margin-bottom: 16px; color: var(--text); }
        .page-content ul, .page-content ol {
            margin-bottom: 16px; padding-left: 24px;
        }
        .page-content li { margin-bottom: 6px; }
        .page-content strong { font-weight: 600; }

        .page-footer {
            max-width: 800px; margin: 0 auto; padding: 24px;
            border-top: 1px solid var(--border); text-align: center;
            font-size: 0.85rem; color: var(--text-muted);
        }
        .page-footer a { margin: 0 12px; }

        @media (max-width: 768px) {
            .page-content { padding: 60px 20px 48px; }
            .page-content h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <nav class="page-nav">
        <div class="page-nav-inner">
            <a href="index.html" class="brand">{{ app_name }}</a>
            <a href="index.html" class="back">&larr; Back to home</a>
        </div>
    </nav>
    <main class="page-content">
        {{ content }}
    </main>
    <footer class="page-footer">
        <p>&copy; {{ year }} {{ developer_name }}</p>
        <p>
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="terms-of-service.html">Terms of Service</a>
            <a href="support.html">Support</a>
        </p>
    </footer>
</body>
</html>
